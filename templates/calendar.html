<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/static/favicon.ico" type="image/x-icon">
<link rel="shortcut icon" href="/static/favicon.ico">

<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<title>Calendario — BaluHome</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">
<link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="subapp-body">
<div class="subapp-wrapper">

  <header class="subapp-header">
    <a href="/home" class="subapp-back">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </a>
    <div class="subapp-title-wrap">
      <h1 class="subapp-title">Calendario</h1>
    </div>
    <button class="btn btn-sm btn-primary" id="btn-add-event" style="flex-shrink:0">+ Añadir</button>
      <a href="/profile" class="header-friends-btn" id="friends-btn" title="Amigos">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
      <span class="friends-badge" id="friends-badge" style="display:none"></span>
    </a>
  </header>

  <div class="subapp-content">

    <!-- Mini calendar view -->
    <div class="cal-grid-wrap" id="cal-wrap">
      <!-- Generated by JS -->
    </div>

    <!-- Events list by month -->
    <div class="cal-events-section">
      <h3 class="cal-section-title">Todos los eventos</h3>
      <div id="events-list" class="cal-events-list">
        {% for item in events %}
        <div class="cal-event-item" data-id="{{ item.id }}" data-day="{{ item.day }}" data-month="{{ item.month }}">
          <div class="cal-event-dot" style="background:{{ item.color }}"></div>
          <div class="cal-event-info">
            <span class="cal-event-title">{{ item.title }}</span>
            <span class="cal-event-date">{{ item.day }}/{{ '%02d'|format(item.month) }}</span>
          </div>
          <button class="cal-event-delete" data-id="{{ item.id }}" aria-label="Eliminar">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
          </button>
        </div>
        {% else %}
        <div class="empty-state" id="empty-events">
          <svg class="empty-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg>
          <p>Sin eventos</p>
          <p class="empty-sub">Añade cumpleaños y fechas especiales</p>
        </div>
        {% endfor %}
      </div>
    </div>

  </div>
</div>

<!-- Add Event Modal -->
<div id="modal-event" class="modal hidden">
  <div class="modal-backdrop" id="modal-backdrop"></div>
  <div class="modal-content">
    <div class="modal-header">
      <h2>Nueva fecha especial</h2>
      <button class="modal-close" id="modal-close">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Nombre del evento</label>
        <input type="text" id="ev-title" placeholder="Cumpleaños de Mario..." maxlength="100" autocomplete="off">
      </div>
      <div style="display:flex;gap:1rem">
        <div class="form-group" style="flex:1">
          <label>Día</label>
          <input type="number" id="ev-day" min="1" max="31" placeholder="15">
        </div>
        <div class="form-group" style="flex:2">
          <label>Mes</label>
          <select id="ev-month" class="form-select">
            <option value="1">Enero</option>
            <option value="2">Febrero</option>
            <option value="3">Marzo</option>
            <option value="4">Abril</option>
            <option value="5">Mayo</option>
            <option value="6">Junio</option>
            <option value="7">Julio</option>
            <option value="8">Agosto</option>
            <option value="9">Septiembre</option>
            <option value="10">Octubre</option>
            <option value="11">Noviembre</option>
            <option value="12">Diciembre</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Color</label>
        <div class="color-picker-row" id="color-picker">
          <button class="color-btn active" data-color="#06b6d4" style="background:#06b6d4"></button>
          <button class="color-btn" data-color="#f59e0b" style="background:#f59e0b"></button>
          <button class="color-btn" data-color="#ef4444" style="background:#ef4444"></button>
          <button class="color-btn" data-color="#10b981" style="background:#10b981"></button>
          <button class="color-btn" data-color="#8b5cf6" style="background:#8b5cf6"></button>
          <button class="color-btn" data-color="#ec4899" style="background:#ec4899"></button>
          <button class="color-btn" data-color="#f97316" style="background:#f97316"></button>
        </div>
      </div>
      <div id="ev-error" class="alert alert-error" style="display:none"></div>
      <button class="btn btn-primary btn-full" id="btn-save-event">Guardar evento</button>
    </div>
  </div>
</div>

<script>
const CSRF = {{ csrf_token | tojson }};
const TODAY_DAY = {{ today_day }};
const TODAY_MONTH = {{ today_month }};
const TODAY_YEAR = {{ today_year }};
const MONTH_NAMES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

const eventsData = [
  {% for item in events %}
  { id: {{ item.id }}, title: {{ item.title | tojson }}, day: {{ item.day }}, month: {{ item.month }}, color: {{ item.color | tojson }} },
  {% endfor %}
];

let selectedColor = '#06b6d4';

function api(url, body) {
  return fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ...body, csrf_token: CSRF })
  }).then(r => r.json());
}

function buildCalendar() {
  const wrap = document.getElementById('cal-wrap');
  const daysInMonth = new Date(TODAY_YEAR, TODAY_MONTH, 0).getDate();
  const firstDay = new Date(TODAY_YEAR, TODAY_MONTH - 1, 1).getDay();
  const adj = (firstDay + 6) % 7;

  const eventsThisMonth = eventsData.filter(e => e.month === TODAY_MONTH);
  const evMap = {};
  eventsThisMonth.forEach(e => {
    if (!evMap[e.day]) evMap[e.day] = [];
    evMap[e.day].push(e);
  });

  let html = `<div class="cal-month-header"><button id="cal-prev">&lt;</button><span id="cal-month-label">${MONTH_NAMES[TODAY_MONTH-1]} ${TODAY_YEAR}</span><button id="cal-next">&gt;</button></div>`;
  html += '<div class="cal-grid">';
  ['L','M','X','J','V','S','D'].forEach(d => {
    html += `<div class="cal-day-header">${d}</div>`;
  });
  for (let i = 0; i < adj; i++) html += '<div class="cal-day-empty"></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = d === TODAY_DAY;
    const dots = (evMap[d] || []).map(e => `<span class="cal-dot" style="background:${e.color}"></span>`).join('');
    html += `<div class="cal-day ${isToday ? 'today' : ''}">${d}${dots ? '<div class="cal-dots">' + dots + '</div>' : ''}</div>`;
  }
  html += '</div>';
  wrap.innerHTML = html;
}

buildCalendar();

document.getElementById('btn-add-event').addEventListener('click', () => {
  document.getElementById('modal-event').classList.remove('hidden');
  document.getElementById('ev-day').value = TODAY_DAY;
  document.getElementById('ev-month').value = TODAY_MONTH;
  document.getElementById('ev-title').focus();
});

document.getElementById('modal-close').addEventListener('click', () => {
  document.getElementById('modal-event').classList.add('hidden');
  document.getElementById('ev-error').style.display = 'none';
});

document.getElementById('modal-backdrop').addEventListener('click', () => {
  document.getElementById('modal-event').classList.add('hidden');
});

document.getElementById('color-picker').addEventListener('click', e => {
  const btn = e.target.closest('.color-btn');
  if (!btn) return;
  document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedColor = btn.dataset.color;
});

document.getElementById('btn-save-event').addEventListener('click', async () => {
  const title = document.getElementById('ev-title').value.trim();
  const day = parseInt(document.getElementById('ev-day').value);
  const month = parseInt(document.getElementById('ev-month').value);
  const errEl = document.getElementById('ev-error');

  if (!title) { errEl.textContent = 'Añade un nombre'; errEl.style.display = ''; return; }
  if (!day || day < 1 || day > 31) { errEl.textContent = 'Día inválido'; errEl.style.display = ''; return; }

  errEl.style.display = 'none';
  const res = await api('/api/calendar/add', { title, day, month, color: selectedColor });
  if (res.success) {
    location.reload();
  } else {
    errEl.textContent = res.error || 'Error';
    errEl.style.display = '';
  }
});

document.getElementById('events-list').addEventListener('click', async e => {
  const deleteBtn = e.target.closest('.cal-event-delete');
  if (deleteBtn) {
    const id = parseInt(deleteBtn.dataset.id);
    if (!confirm('¿Eliminar este evento?')) return;
    const res = await api('/api/calendar/delete', { id });
    if (res.success) {
      document.querySelector(`.cal-event-item[data-id="${id}"]`).remove();
      const evIdx = eventsData.findIndex(e => e.id === id);
      if (evIdx !== -1) eventsData.splice(evIdx, 1);
      buildCalendar();
      if (document.querySelectorAll('.cal-event-item').length === 0) {
        document.getElementById('events-list').innerHTML = '<div class="empty-state"><p>Sin eventos</p></div>';
      }
    }
  }
});
</script>
<script>
fetch('/api/friends/pending-count').then(r=>r.json()).then(d=>{
  if(d.count>0){const b=document.getElementById('friends-badge');if(b){b.textContent=d.count;b.style.display='';}}
}).catch(()=>{});
</script>
<script>
/* Last-page memory */
(function() {
  const path = location.pathname + location.search;
  const skip = ['/', '/logout', '/register'];
  if (!skip.includes(location.pathname)) {
    localStorage.setItem('bh-last-page', path);
  }
})();
</script>
</body>
</html>
