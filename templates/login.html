<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/static/favicon.ico" type="image/x-icon">
<link rel="shortcut icon" href="/static/favicon.ico">

<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<title>BaluHome — Iniciar sesión</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">
<script>(function(){var m=document.cookie.match(/(?:^|; )bh_theme=([^;]+)/);document.documentElement.dataset.theme=(m&&m[1])||"dark";})();</script>
<link rel="stylesheet" href="/static/css/app.css?v={{ ASSET_VERSION }}">
</head>
<body class="auth-body">
<div class="auth-container">
  <div class="auth-logo">
    <svg width="24" height="24" class="logo-svg" viewBox="0 0 24 24" fill="currentColor">
      <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
    </svg>
    <h1>BaluHome</h1>
    <p>Tu plataforma personal</p>
  </div>

  {% if error %}
  <div class="alert alert-error">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/" class="auth-form">
    <input type="hidden" name="csrf_token" value="{{ csrf }}">
    <div class="form-group">
      <label for="username">Usuario</label>
      <input type="text" id="username" name="username"
             value="{{ username_val or '' }}"
             placeholder="Tu nombre de usuario" autocomplete="username" autocapitalize="off" autocorrect="off" spellcheck="false" required>
    </div>
    <div class="form-group">
      <label for="password">Contraseña</label>
      <div style="position:relative;display:flex;align-items:center">
      <input type="password" id="password" name="password" placeholder="Tu contraseña" autocomplete="current-password" required style="padding-right:2.75rem;width:100%">
      <button type="button" onclick="(function(){var i=document.getElementById('password');i.type=i.type==='text'?'password':'text'})()" style="position:absolute;right:.625rem;background:none;border:none;color:var(--text3);cursor:pointer;padding:0;display:flex">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="width:20px;height:20px"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
      </button>
    </div>
    </div>
    <button type="submit" class="btn btn-primary btn-full">Iniciar sesión</button>
  </form>

  <p class="auth-footer">BaluHome &copy; 2025</p>
</div>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
</body>
</html>
