<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/static/favicon.ico" type="image/x-icon">
<link rel="shortcut icon" href="/static/favicon.ico">

<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<title>Registro — BaluHome</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">
<script>(function(){var m=document.cookie.match(/(?:^|; )bh_theme=([^;]+)/);document.documentElement.dataset.theme=(m&&m[1])||"dark";})();</script>
<link rel="stylesheet" href="/static/css/app.css?v={{ ASSET_VERSION }}">
</head>
<body class="auth-body">
<div class="auth-container">
  <div class="auth-logo">
    <svg width="24" height="24" class="logo-svg" viewBox="0 0 24 24" fill="currentColor">
      <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
    </svg>
    <h1>BaluHome</h1>
    <p>Crea tu cuenta</p>
  </div>

  {% if invalid %}
    <div class="alert alert-error">
      Este enlace de invitación no es válido o ya fue usado.<br>
      <a href="/" style="color:var(--cyan);">Ir al inicio</a>
    </div>
  {% elif success %}
    <div class="alert alert-success">{{ success }}</div>
    <a href="/" class="btn btn-primary btn-full" style="margin-top:1rem;display:block;text-align:center;">Iniciar sesión</a>
  {% else %}
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/register?token={{ token }}" class="auth-form">
      <input type="hidden" name="csrf_token" value="{{ csrf }}">
      <input type="hidden" name="token" value="{{ token }}">
      <div class="form-group">
        <label for="username">Usuario</label>
        <input type="text" id="username" name="username"
               value="{{ username_val or '' }}"
               placeholder="Elige un nombre de usuario" autocomplete="username" autocapitalize="off" autocorrect="off" spellcheck="false" required>
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password"
               placeholder="Elige una contraseña (mín. 4)" autocomplete="new-password" required>
      </div>
      <div class="form-group">
        <label for="password2">Repite la contraseña</label>
        <input type="password" id="password2" name="password2"
               placeholder="Repite la contraseña" autocomplete="new-password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Crear cuenta</button>
    </form>
  {% endif %}
  <p class="auth-footer">BaluHome &copy; 2025</p>
</div>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
</body>
</html>
