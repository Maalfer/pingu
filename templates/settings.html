{% extends "_base.html" %}
{% block title %}Ajustes — BaluHome{% endblock %}

{% block header_title %}Ajustes{% endblock %}

{% block content %}
<div class="pf-body">
    <div class="pf-sections">

      <!-- Notificaciones -->
      <div class="pf-card">
        <div class="pf-card-header">
          <div class="pf-card-icon pf-icon-bell">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
          </div>
          <div class="pf-card-label">Notificaciones</div>
        </div>
        <div class="pf-card-body">
          <div class="settings-row">
            <div class="settings-row-info">
              <div class="settings-row-title">Activar notificaciones</div>
              <div class="settings-row-sub" id="notif-status">Cargando…</div>
            </div>
            <label class="switch">
              <input type="checkbox" id="notif-toggle" disabled>
              <span class="switch-slider"></span>
            </label>
          </div>
          <div id="notif-msg" class="pf-msg"></div>
        </div>
      </div>

      <!-- Tema -->
      <div class="pf-card">
        <div class="pf-card-header">
          <div class="pf-card-icon pf-icon-theme">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-.99 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8zm-5.5 9c-.83 0-1.5-.67-1.5-1.5S5.67 9 6.5 9 8 9.67 8 10.5 7.33 12 6.5 12zm3-4C8.67 8 8 7.33 8 6.5S8.67 5 9.5 5s1.5.67 1.5 1.5S10.33 8 9.5 8zm5 0c-.83 0-1.5-.67-1.5-1.5S13.67 5 14.5 5s1.5.67 1.5 1.5S15.33 8 14.5 8zm3 4c-.83 0-1.5-.67-1.5-1.5S16.67 9 17.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
          </div>
          <div class="pf-card-label">Tema</div>
        </div>
        <div class="pf-card-body">
          <div class="pf-theme-row" id="theme-picker">
            <button type="button" class="pf-theme-btn {% if user.theme == 'dark' or not user.theme %}active{% endif %}" data-theme="dark">
              <span class="pf-theme-swatch pf-theme-dark">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
              </span>
              <span class="pf-theme-name">Oscuro</span>
              <span class="pf-theme-check"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></span>
            </button>
            <button type="button" class="pf-theme-btn {% if user.theme == 'light' %}active{% endif %}" data-theme="light">
              <span class="pf-theme-swatch pf-theme-light">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1z"/></svg>
              </span>
              <span class="pf-theme-name">Claro</span>
              <span class="pf-theme-check"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></span>
            </button>
            <button type="button" class="pf-theme-btn {% if user.theme == 'dracula' %}active{% endif %}" data-theme="dracula">
              <span class="pf-theme-swatch pf-theme-dracula">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C9.24 2 7 4.24 7 7c0 1.5.66 2.84 1.7 3.76C7.07 11.55 6 13.15 6 15v6h12v-6c0-1.85-1.07-3.45-2.7-4.24C16.34 9.84 17 8.5 17 7c0-2.76-2.24-5-5-5z"/></svg>
              </span>
              <span class="pf-theme-name">Drácula</span>
              <span class="pf-theme-check"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></span>
            </button>
            <button type="button" class="pf-theme-btn {% if user.theme == 'pink' %}active{% endif %}" data-theme="pink">
              <span class="pf-theme-swatch pf-theme-pink">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
              </span>
              <span class="pf-theme-name">Rosa</span>
              <span class="pf-theme-check"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></span>
            </button>
          </div>
          <div id="theme-msg" class="pf-msg"></div>
        </div>
      </div>

    </div>
  </div>

<div class="pf-toast" id="pf-toast"></div>
{% endblock %}

{% block scripts %}
<script>
const CSRF = {{ csrf_token | tojson }};

function api(url, body) {
  return fetch(url, {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({...body, csrf_token: CSRF})
  }).then(r => r.json());
}

let toastTimer;
function toast(text, ok = true) {
  const t = document.getElementById('pf-toast');
  t.textContent = text;
  t.className = 'pf-toast show ' + (ok ? 'ok' : 'err');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

document.getElementById('theme-picker').addEventListener('click', async e => {
  const btn = e.target.closest('.pf-theme-btn');
  if (!btn || btn.classList.contains('active')) return;
  const theme = btn.dataset.theme;
  document.querySelectorAll('.pf-theme-btn').forEach(b => b.classList.toggle('active', b === btn));
  document.documentElement.dataset.theme = theme;
  document.cookie = 'bh_theme=' + theme + '; max-age=' + (2*365*86400) + '; path=/; samesite=lax';
  const themeLabels = { light: 'claro', dark: 'oscuro', dracula: 'Drácula', pink: 'Rosa' };
  try {
    const res = await api('/api/profile/set-theme', {theme});
    if (res.success) toast('Tema ' + (themeLabels[theme] || theme) + ' activado');
    else toast(res.error || 'Error', false);
  } catch { toast('Error de conexión', false); }
});

const notifToggle = document.getElementById('notif-toggle');
const notifStatus = document.getElementById('notif-status');
const notifMsg = document.getElementById('notif-msg');

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(base64);
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

async function syncNotifUI() {
  const supported = ('serviceWorker' in navigator) && ('PushManager' in window) && ('Notification' in window);
  if (!supported) {
    notifStatus.textContent = 'Tu navegador no soporta notificaciones';
    notifToggle.disabled = true; notifToggle.checked = false; return;
  }
  if (Notification.permission === 'denied') {
    notifStatus.textContent = 'Bloqueadas por el navegador. Habilítalas desde los ajustes del sistema/navegador.';
    notifToggle.disabled = true; notifToggle.checked = false; return;
  }
  try {
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.getSubscription();
    if (sub && Notification.permission === 'granted') {
      notifStatus.textContent = 'Activas — recibirás avisos en este dispositivo.';
      notifToggle.checked = true;
    } else {
      notifStatus.textContent = 'Desactivadas';
      notifToggle.checked = false;
    }
    notifToggle.disabled = false;
  } catch { notifStatus.textContent = 'No se pudo verificar el estado'; notifToggle.disabled = true; }
}

async function enableNotif() {
  if (Notification.permission !== 'granted') {
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') throw new Error('Permiso denegado');
  }
  const reg = await navigator.serviceWorker.ready;
  let sub = await reg.pushManager.getSubscription();
  if (!sub) {
    const keyRes = await fetch('/api/push/vapid-key').then(r => r.json());
    if (!keyRes.key) throw new Error('Servidor sin clave VAPID');
    sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(keyRes.key),
    });
  }
  const json = sub.toJSON();
  const res = await fetch('/api/push/subscribe', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ endpoint: json.endpoint, p256dh: json.keys.p256dh, auth: json.keys.auth }),
  }).then(r => r.json());
  if (!res.success) throw new Error(res.error || 'Error en el servidor');
}

async function disableNotif() {
  const reg = await navigator.serviceWorker.ready;
  const sub = await reg.pushManager.getSubscription();
  if (!sub) return;
  const endpoint = sub.endpoint;
  await sub.unsubscribe();
  await fetch('/api/push/unsubscribe', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ endpoint, csrf_token: CSRF }),
  });
}

notifToggle.addEventListener('change', async () => {
  notifToggle.disabled = true;
  notifMsg.textContent = ''; notifMsg.classList.remove('show','err');
  try {
    if (notifToggle.checked) { await enableNotif(); toast('Notificaciones activadas'); }
    else { await disableNotif(); toast('Notificaciones desactivadas'); }
  } catch (e) {
    notifMsg.textContent = e.message; notifMsg.className = 'pf-msg show err';
    toast(e.message, false);
  }
  await syncNotifUI();
});

syncNotifUI();
</script>
{% endblock %}
