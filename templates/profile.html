<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/static/favicon.ico" type="image/x-icon">
<link rel="shortcut icon" href="/static/favicon.ico">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<title>Mi perfil — BaluHome</title>
<link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="subapp-body">
<div class="subapp-wrapper">

  <header class="subapp-header">
    <a href="/home" class="subapp-back">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </a>
    <div class="subapp-title-wrap"><h1 class="subapp-title">Mi perfil</h1></div>
    <a href="/logout" class="subapp-logout" title="Cerrar sesión" onclick="return confirm('¿Cerrar sesión?')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
    </a>
  </header>

  <div class="pf-body">

    <!-- Hero -->
    <div class="pf-hero">
      <div class="pf-hero-bg"></div>
      <div class="pf-avatar-wrap" id="avatar-wrap">
        <div class="pf-avatar" id="avatar-display">
          {% if has_avatar %}<img src="/static/avatars/{{ user.id }}.jpg?v={{ user.id }}" onerror="this.remove()" alt="" id="avatar-img">{% endif %}
          <span id="avatar-letter">{{ user.username[0]|upper }}</span>
        </div>
        <div class="pf-avatar-ring" id="avatar-ring"></div>
        <div class="pf-avatar-cam">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 15.2A3.2 3.2 0 1 0 12 8.8a3.2 3.2 0 0 0 0 6.4zm0-8.4a5.2 5.2 0 1 1 0 10.4 5.2 5.2 0 0 1 0-10.4zM3 4V1h2v3h3v2H5v3H3V6H0V4h3zm4 4V5h7l1.83 2H21c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H5c-1.1 0-2-.9-2-2V8h4z"/></svg>
        </div>
        <input type="file" id="avatar-file-input" accept="image/*">
      </div>
      <div class="pf-hero-name" id="hero-name">{{ user.username }}</div>
      <div class="pf-hero-meta">
        <span class="badge {% if user.role == 'admin' %}badge-admin{% else %}badge-user{% endif %}">{{ user.role }}</span>
        <span class="pf-hero-since">Miembro desde {{ user.created_at[:10] }}</span>
      </div>
      <div id="avatar-upload-msg" class="pf-upload-msg"></div>
    </div>

    <div class="pf-sections">

      <!-- Nombre -->
      <div class="pf-card">
        <div class="pf-card-header">
          <div class="pf-card-icon pf-icon-user">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
          </div>
          <div class="pf-card-label">Nombre de usuario</div>
        </div>
        <div class="pf-card-body">
          <div class="pf-input-row">
            <input type="text" id="new-username" value="{{ user.username }}" maxlength="30" autocomplete="off" autocapitalize="off" autocorrect="off" class="pf-input">
            <button class="pf-save-btn" id="btn-save-username">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
            </button>
          </div>
          <div id="username-msg" class="pf-msg"></div>
        </div>
      </div>

      <!-- Contraseña -->
      <div class="pf-card">
        <div class="pf-card-header pf-card-toggle" id="pw-toggle">
          <div class="pf-card-icon pf-icon-lock">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
          </div>
          <div class="pf-card-label">Contraseña</div>
          <div class="pf-chevron" id="pw-chevron"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg></div>
        </div>
        <div class="pf-card-body pf-pw-body" id="pw-body" style="display:none">
          <div class="pf-pw-field">
            <input type="password" id="current-pw" placeholder="Contraseña actual" autocomplete="current-password" class="pf-input">
            <button class="pf-eye" data-target="current-pw" type="button"><svg viewBox="0 0 24 24" fill="currentColor" style="width:20px;height:20px;opacity:.4"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg></button>
          </div>
          <div class="pf-pw-field">
            <input type="password" id="new-pw" placeholder="Nueva contraseña (mín. 4)" autocomplete="new-password" class="pf-input">
            <button class="pf-eye" data-target="new-pw" type="button"><svg viewBox="0 0 24 24" fill="currentColor" style="width:20px;height:20px;opacity:.4"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg></button>
          </div>
          <div class="pf-pw-field">
            <input type="password" id="new-pw2" placeholder="Repite la nueva contraseña" autocomplete="new-password" class="pf-input">
            <button class="pf-eye" data-target="new-pw2" type="button"><svg viewBox="0 0 24 24" fill="currentColor" style="width:20px;height:20px;opacity:.4"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg></button>
          </div>
          <button class="btn btn-secondary btn-full" id="btn-save-password">Cambiar contraseña</button>
          <div id="password-msg" class="pf-msg"></div>
        </div>
      </div>

      <!-- Amigos (siempre visible, dinámico) -->
      <div class="pf-card" id="friends-card">
        <div class="pf-card-header">
          <div class="pf-card-icon pf-icon-friends">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
          </div>
          <div class="pf-card-label">Amigos <span class="pf-friends-badge" id="friends-pending-badge" style="display:none"></span></div>
        </div>
        <div class="pf-friends-body" id="friends-body">
          <div class="pf-friends-loading" id="friends-loading">
            <div class="pf-spinner"></div>
          </div>
        </div>
      </div>

      <!-- Logout -->
      <a href="/logout" class="pf-logout-row" onclick="return confirm('¿Cerrar sesión?')">
        <div class="pf-card-icon pf-icon-logout">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
        </div>
        <span>Cerrar sesión</span>
        <svg class="pf-logout-arrow" viewBox="0 0 24 24" fill="currentColor"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
      </a>

    </div>
  </div>
</div>

<div class="pf-toast" id="pf-toast"></div>

<script>
const CSRF = {{ csrf_token | tojson }};

function api(url, body) {
  return fetch(url, {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({...body, csrf_token: CSRF})
  }).then(r => r.json());
}

let toastTimer;
function toast(text, ok = true) {
  const t = document.getElementById('pf-toast');
  t.textContent = text;
  t.className = 'pf-toast show ' + (ok ? 'ok' : 'err');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

function showMsg(el, text, ok) {
  el.textContent = text;
  el.className = 'pf-msg show ' + (ok ? 'ok' : 'err');
  setTimeout(() => el.classList.remove('show'), 3500);
}

// ── Avatar ────────────────────────────────────────────────────────────────────
document.getElementById('avatar-wrap').addEventListener('click', () => {
  document.getElementById('avatar-file-input').click();
});

document.getElementById('avatar-file-input').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  const ring = document.getElementById('avatar-ring');
  ring.classList.add('uploading');
  toast('Subiendo foto…');
  const fd = new FormData();
  fd.append('file', file);
  fd.append('csrf_token', CSRF);
  try {
    const res = await fetch('/api/profile/upload-picture', {method:'POST', body:fd}).then(r=>r.json());
    if (res.success) {
      const display = document.getElementById('avatar-display');
      let img = display.querySelector('img');
      if (!img) { img = document.createElement('img'); img.id='avatar-img'; img.onerror=()=>img.remove(); img.alt=''; display.insertBefore(img, display.firstChild); }
      img.src = res.url + '?v=' + Date.now();
      toast('Foto actualizada');
    } else { toast(res.error || 'Error', false); }
  } catch { toast('Error de conexión', false); }
  ring.classList.remove('uploading');
  e.target.value = '';
});

// ── Username ──────────────────────────────────────────────────────────────────
document.getElementById('btn-save-username').addEventListener('click', async () => {
  const username = document.getElementById('new-username').value.trim();
  const msg = document.getElementById('username-msg');
  const btn = document.getElementById('btn-save-username');
  btn.classList.add('saving');
  const res = await api('/api/profile/change-username', {username});
  btn.classList.remove('saving');
  if (res.success) {
    showMsg(msg, '✓ Nombre actualizado', true);
    document.getElementById('hero-name').textContent = res.username;
    document.getElementById('avatar-letter').textContent = res.username[0].toUpperCase();
    toast('Nombre actualizado');
  } else { showMsg(msg, res.error || 'Error', false); }
});
document.getElementById('new-username').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('btn-save-username').click(); });

// ── Password ──────────────────────────────────────────────────────────────────
let pwOpen = false;
document.getElementById('pw-toggle').addEventListener('click', () => {
  pwOpen = !pwOpen;
  document.getElementById('pw-body').style.display = pwOpen ? '' : 'none';
  document.getElementById('pw-chevron').style.transform = pwOpen ? 'rotate(90deg)' : '';
  if (pwOpen) document.getElementById('current-pw').focus();
});

document.getElementById('btn-save-password').addEventListener('click', async () => {
  const cp = document.getElementById('current-pw').value;
  const np = document.getElementById('new-pw').value;
  const np2 = document.getElementById('new-pw2').value;
  const msg = document.getElementById('password-msg');
  if (np !== np2) { showMsg(msg, 'Las contraseñas no coinciden', false); return; }
  const res = await api('/api/profile/change-password', {current_password: cp, new_password: np});
  if (res.success) {
    showMsg(msg, '✓ Contraseña actualizada', true);
    toast('Contraseña actualizada');
    ['current-pw','new-pw','new-pw2'].forEach(id => document.getElementById(id).value = '');
  } else { showMsg(msg, res.error || 'Error', false); }
});

document.querySelectorAll('.pf-eye').forEach(btn => {
  btn.addEventListener('click', () => {
    const input = document.getElementById(btn.dataset.target);
    input.type = input.type === 'text' ? 'password' : 'text';
    btn.querySelector('svg').style.opacity = input.type === 'text' ? '1' : '0.4';
  });
});

// ── AMIGOS (totalmente dinámico) ──────────────────────────────────────────────
function esc(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function avatarHtml(u) {
  return `<div class="pf-friend-avatar">
    <img src="/static/avatars/${u.id}.jpg" onerror="this.remove()" alt="">
    ${esc(u.username[0].toUpperCase())}
  </div>`;
}

function renderFriends(users) {
  const received = users.filter(u => u.status === 'received');
  const friends  = users.filter(u => u.status === 'friend');
  const sent     = users.filter(u => u.status === 'sent');
  const others   = users.filter(u => u.status === 'none');

  // Update badge
  const badge = document.getElementById('friends-pending-badge');
  if (received.length > 0) {
    badge.textContent = received.length;
    badge.style.display = '';
  } else {
    badge.style.display = 'none';
  }

  let html = '';

  if (received.length) {
    html += `<div class="pf-friends-group">
      <div class="pf-friends-group-title"><span>Solicitudes recibidas</span><span class="pf-friends-count">${received.length}</span></div>`;
    received.forEach(u => {
      html += `<div class="pf-friend-row" id="frow-${u.id}">
        ${avatarHtml(u)}
        <div class="pf-friend-info">
          <span class="pf-friend-name">${esc(u.username)}</span>
          <span class="pf-friend-sub">quiere ser tu amigo</span>
        </div>
        <div class="pf-friend-actions">
          <button class="pf-action-btn pf-btn-ok" onclick="friendAction('accept',${u.friendship_id},${u.id},this)" title="Aceptar">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
          </button>
          <button class="pf-action-btn pf-btn-no" onclick="friendAction('reject',${u.friendship_id},${u.id},this)" title="Rechazar">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
          </button>
        </div>
      </div>`;
    });
    html += '</div>';
  }

  if (friends.length) {
    html += `<div class="pf-friends-group">
      <div class="pf-friends-group-title"><span>Tus amigos</span><span class="pf-friends-count">${friends.length}</span></div>`;
    friends.forEach(u => {
      html += `<div class="pf-friend-row" id="frow-${u.id}">
        ${avatarHtml(u)}
        <div class="pf-friend-info">
          <span class="pf-friend-name">${esc(u.username)}</span>
          <span class="pf-friend-sub pf-sub-ok">Amigos ✓</span>
        </div>
        <button class="pf-action-btn pf-btn-del" onclick="friendAction('unfriend',${u.friendship_id},${u.id},this,'${esc(u.username)}')" title="Eliminar amigo">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M14 8c0-2.21-1.79-4-4-4S6 5.79 6 8s1.79 4 4 4 4-1.79 4-4zm3 2v2h6v-2h-6zM2 18v2h16v-2c0-2.66-5.33-4-8-4s-8 1.34-8 4z"/></svg>
        </button>
      </div>`;
    });
    html += '</div>';
  }

  if (sent.length) {
    html += `<div class="pf-friends-group">
      <div class="pf-friends-group-title"><span>Solicitudes enviadas</span><span class="pf-friends-count">${sent.length}</span></div>`;
    sent.forEach(u => {
      html += `<div class="pf-friend-row" id="frow-${u.id}">
        ${avatarHtml(u)}
        <div class="pf-friend-info">
          <span class="pf-friend-name">${esc(u.username)}</span>
          <span class="pf-friend-sub">Pendiente…</span>
        </div>
        <button class="pf-action-btn pf-btn-del" onclick="friendAction('cancel',${u.friendship_id},${u.id},this)" title="Cancelar solicitud">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>`;
    });
    html += '</div>';
  }

  if (others.length) {
    html += `<div class="pf-friends-group">
      <div class="pf-friends-group-title"><span>Añadir amigos</span></div>`;
    others.forEach(u => {
      html += `<div class="pf-friend-row" id="frow-${u.id}">
        ${avatarHtml(u)}
        <div class="pf-friend-info">
          <span class="pf-friend-name">${esc(u.username)}</span>
        </div>
        <button class="pf-action-btn pf-btn-ok" onclick="friendAction('add',null,${u.id},this)" title="Añadir">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </button>
      </div>`;
    });
    html += '</div>';
  }

  if (!users.length) {
    html = '<p class="pf-friends-empty">No hay otros usuarios registrados aún.</p>';
  }

  document.getElementById('friends-body').innerHTML = html;
}

async function loadFriends() {
  try {
    const data = await fetch('/api/friends/list').then(r => r.json());
    renderFriends(data.users || []);
  } catch {
    document.getElementById('friends-body').innerHTML = '<p class="pf-friends-empty">Error al cargar amigos.</p>';
  }
}

async function friendAction(action, fid, uid, btn, name) {
  btn.disabled = true;
  btn.style.opacity = '0.5';

  try {
    let res;
    if (action === 'add') {
      res = await api('/api/friends/send', {user_id: uid});
      if (res.success) {
        toast('Solicitud enviada');
        await loadFriends();
      } else { toast(res.error || 'Error', false); }

    } else if (action === 'accept') {
      res = await api('/api/friends/accept', {friendship_id: fid});
      if (res.success) {
        toast('¡Ahora sois amigos!');
        await loadFriends();
      } else { toast(res.error || 'Error', false); }

    } else if (action === 'reject') {
      res = await api('/api/friends/reject', {friendship_id: fid});
      if (res.success) {
        toast('Solicitud rechazada');
        await loadFriends();
      } else { toast(res.error || 'Error', false); }

    } else if (action === 'cancel') {
      res = await api('/api/friends/reject', {friendship_id: fid});
      if (res.success) {
        toast('Solicitud cancelada');
        await loadFriends();
      } else { toast(res.error || 'Error', false); }

    } else if (action === 'unfriend') {
      if (!confirm('¿Eliminar a ' + (name || 'este amigo') + '?')) {
        btn.disabled = false; btn.style.opacity = ''; return;
      }
      res = await api('/api/friends/reject', {friendship_id: fid});
      if (res.success) {
        toast('Amigo eliminado');
        await loadFriends();
      } else { toast(res.error || 'Error', false); }
    }
  } catch {
    toast('Error de conexión', false);
    btn.disabled = false; btn.style.opacity = '';
  }
}

// Carga inicial
loadFriends();

/* Last-page memory */
(function() {
  if (!['/','logout','/register'].includes(location.pathname))
    localStorage.setItem('bh-last-page', location.pathname);
})();
</script>
</body>
</html>
