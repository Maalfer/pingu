<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/static/favicon.ico" type="image/x-icon">
<link rel="shortcut icon" href="/static/favicon.ico">

<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<title>Chat con {{ other_user.username }} — BaluHome</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">
<link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="subapp-body chat-app-body">
<div class="subapp-wrapper chat-wrapper">

  <header class="subapp-header chat-header-detail">
    <a href="/chat" class="subapp-back">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </a>
    <div class="chat-header-user">
      <div class="friend-avatar"><img src="/static/avatars/{{ other_user.id }}.jpg" onerror="this.remove()" alt="">{{ other_user.username[0]|upper }}</div>
      <div class="chat-header-name">{{ other_user.username }}</div>
    </div>
  </header>

  <div class="chat-messages" id="chat-messages">
    {% if not messages %}
    <div class="empty-state" style="padding:3rem 1rem">
      <p>Empieza la conversación</p>
    </div>
    {% endif %}
    {% for msg in messages %}
    <div class="chat-msg {% if msg.sender_id == user_id %}chat-msg-mine{% else %}chat-msg-theirs{% endif %}" data-id="{{ msg.id }}">
      <div class="chat-bubble">
        <div class="chat-text">{{ msg.content }}</div>
        <div class="chat-time">{{ msg.created_at[11:16] }}</div>
      </div>
    </div>
    {% endfor %}
  </div>

  <div class="chat-input-area">
    <input type="text" id="msg-input" class="chat-input" placeholder="Escribe un mensaje..." maxlength="1000" autocomplete="off">
    <button class="btn btn-primary chat-send-btn" id="btn-send">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

</div>

<script>
const CSRF = {{ csrf_token | tojson }};
const OTHER_ID = {{ other_user.id }};
const MY_ID = {{ user_id }};
const OTHER_NAME = {{ other_user.username | tojson }};
let lastId = {% if messages %}{{ messages[-1].id }}{% else %}0{% endif %};
let polling = null;

function api(url, body) {
  return fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ...body, csrf_token: CSRF })
  }).then(r => r.json());
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function appendMessage(msg) {
  const container = document.getElementById('chat-messages');
  const empty = container.querySelector('.empty-state');
  if (empty) empty.remove();

  const isMine = msg.sender_id === MY_ID;
  const div = document.createElement('div');
  div.className = `chat-msg ${isMine ? 'chat-msg-mine' : 'chat-msg-theirs'}`;
  div.dataset.id = msg.id;
  div.innerHTML = `<div class="chat-bubble">
    <div class="chat-text">${escapeHtml(msg.content)}</div>
    <div class="chat-time">${(msg.created_at || '').substring(11,16)}</div>
  </div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  if (msg.id > lastId) lastId = msg.id;
}

document.getElementById('btn-send').addEventListener('click', sendMessage);
document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const content = input.value.trim();
  if (!content) return;
  input.value = '';
  const res = await api('/api/chat/send', { receiver_id: OTHER_ID, content });
  if (res.success) {
    appendMessage({
      id: res.id,
      sender_id: MY_ID,
      content: content,
      created_at: new Date().toISOString().replace('T', ' ')
    });
  } else {
    input.value = content;
    alert(res.error || 'Error al enviar');
  }
}

async function pollMessages() {
  try {
    const res = await fetch(`/api/chat/messages/${OTHER_ID}?since=${lastId}`);
    const data = await res.json();
    if (data.messages && data.messages.length > 0) {
      data.messages.forEach(msg => {
        if (!document.querySelector(`.chat-msg[data-id="${msg.id}"]`)) {
          appendMessage(msg);
        }
      });
    }
  } catch (e) {}
}

const msgs = document.getElementById('chat-messages');
msgs.scrollTop = msgs.scrollHeight;

polling = setInterval(pollMessages, 3000);

document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    clearInterval(polling);
    polling = null;
  } else if (!polling) {
    pollMessages();
    polling = setInterval(pollMessages, 3000);
  }
});
</script>
<script>
/* Last-page memory */
(function() {
  const path = location.pathname + location.search;
  const skip = ['/', '/logout', '/register'];
  if (!skip.includes(location.pathname)) {
    localStorage.setItem('bh-last-page', path);
  }
})();
</script>
</body>
</html>
