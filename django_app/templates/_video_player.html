<div class="bh-player-overlay hidden" id="bhvp-overlay" aria-hidden="true">
  <div class="bh-player-video-wrap" id="bhvp-wrap">
    <video id="bhvp-video" preload="metadata" playsinline x-webkit-airplay="allow" webkit-airplay="allow"></video>
    <div class="bh-player-controls" id="bhvp-controls">
      <div class="bh-player-top">
        <button class="bh-player-icon-btn" id="bhvp-close" aria-label="Cerrar">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M19 11H7.83l4.88-4.88c.39-.39.39-1.03 0-1.42-.39-.39-1.02-.39-1.41 0l-6.59 6.59c-.39.39-.39 1.02 0 1.41l6.59 6.59c.39.39 1.02.39 1.41 0 .39-.39.39-1.02 0-1.41L7.83 13H19c.55 0 1-.45 1-1s-.45-1-1-1z"/></svg>
        </button>
        <span class="bh-player-title" id="bhvp-title"></span>
        <button class="bh-player-icon-btn" id="bhvp-cast" title="Emitir a la TV" aria-label="Emitir">
          <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M21 3H3c-1.1 0-2 .9-2 2v3h2V5h18v14h-7v2h7c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM1 18v3h3c0-1.66-1.34-3-3-3zm0-4v2c2.76 0 5 2.24 5 5h2c0-3.87-3.13-7-7-7zm0-4v2c4.97 0 9 4.03 9 9h2C12 14.14 7.03 9 1 9z"/></svg>
        </button>
      </div>
      <div class="bh-player-bottom">
        <div class="bh-player-progress">
          <span class="bh-player-time" id="bhvp-current">0:00</span>
          <input type="range" class="bh-player-seek" id="bhvp-seek" min="0" max="1000" value="0" step="1" aria-label="Posición">
          <span class="bh-player-time" id="bhvp-total">0:00</span>
        </div>
        <div class="bh-player-buttons">
          <div class="bh-player-vol">
            <button class="bh-player-ctrl" id="bhvp-vol-btn" aria-label="Silenciar">
              <svg width="24" height="24" id="bhvp-vol-on" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
              <svg width="24" height="24" id="bhvp-vol-off" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
            </button>
            <input type="range" class="bh-player-vol-slider" id="bhvp-vol" min="0" max="1" step="0.05" value="1" aria-label="Volumen">
          </div>
          <button class="bh-player-ctrl bh-player-playpause" id="bhvp-play" aria-label="Play/Pausa">
            <svg width="24" height="24" id="bhvp-icon-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            <svg width="24" height="24" id="bhvp-icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          </button>
          <button class="bh-player-ctrl" id="bhvp-fs" aria-label="Pantalla completa">
            <svg width="24" height="24" id="bhvp-icon-fs-enter" viewBox="0 0 24 24" fill="currentColor"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
            <svg width="24" height="24" id="bhvp-icon-fs-exit" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
